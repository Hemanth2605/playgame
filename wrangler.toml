# Cloudflare Workers config for the Quiz Clash client.
#
# Cloudflare now steers new projects to Workers rather than Pages, so this
# deploys the built React app as an assets-only Worker (no server script --
# there is no `main` key on purpose).
#
# Only the client lives here. The Socket.IO server holds room state in memory
# and needs a long-lived Node process, so it runs on Render instead -- see
# README. VITE_SERVER_URL must be set as a BUILD-time variable in the
# Cloudflare dashboard; Vite inlines it into the bundle, so it cannot be a
# [vars] entry here.
name = "playgame"
compatibility_date = "2026-07-14"

[assets]
directory = "./client/dist"
# The app is a single-page app: every route must serve index.html rather than
# a 404, or a refresh mid-game would fall through to Cloudflare's 404.
not_found_handling = "single-page-application"
